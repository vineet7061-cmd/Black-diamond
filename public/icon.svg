<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background for App Icon -->
  <rect width="512" height="512" rx="115" fill="#0f172a"/>
  
  <!-- Outer Diamond Glow -->
  <path d="M256 80 L420 256 L256 432 L92 256 Z" fill="none" stroke="#1d4ed8" stroke-width="24" stroke-linejoin="round" opacity="0.5"/>
  
  <!-- Core Black Diamond -->
  <path d="M256 96 L400 256 L256 416 L112 256 Z" fill="url(#blackGrad)" stroke="#3b82f6" stroke-width="12" stroke-linejoin="round"/>
  
  <!-- Inner Facets (3D look) -->
  <path d="M112 256 L400 256" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  <path d="M256 96 L256 416" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
  <path d="M256 96 L180 256 L256 416 L332 256 Z" fill="none" stroke="#60a5fa" stroke-width="6" stroke-linejoin="round" opacity="0.6"/>

  <defs>
    <!-- Gradient for Diamond -->
    <linearGradient id="blackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
